{% extends "base.html" %}
{% block title %}Edit Anggota - Manajemen Tugas Kelompok{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Edit Anggota: {{ anggota.nama }}</h1>
    <a href="{{ url_for('anggota.index') }}" class="btn btn-secondary">← Kembali ke Daftar Anggota</a>
</div>

<form method="post" class="form-anggota">
    <div class="form-group">
        <label for="nama">Nama *</label>
        <input type="text" id="nama" name="nama" required value="{{ anggota.nama }}" maxlength="100">
    </div>

    <div class="form-group">
        <label for="nim">NIM *</label>
        <input type="text" id="nim" name="nim" required value="{{ anggota.nim }}" maxlength="20" pattern="[0-9]+">
        <small>Hanya angka.</small>
    </div>

    <div class="form-group">
        <label for="kontak">Kontak (opsional)</label>
        <input type="text" id="kontak" name="kontak" value="{{ anggota.kontak or '' }}" maxlength="50">
    </div>

    <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
</form>
{% endblock %}
