{% extends "base.html" %}
{% block title %}Tambah Tugas - Manajemen Tugas Kelompok{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Tambah Tugas Baru</h1>
    <a href="{{ url_for('tugas.index') }}" class="btn btn-secondary">← Kembali ke Daftar Tugas</a>
</div>

<form method="post" class="form-tugas">
    <div class="form-group">
        <label for="judul_tugas">Judul Tugas *</label>
        <input type="text" id="judul_tugas" name="judul_tugas" required maxlength="200">
    </div>

    <div class="form-group">
        <label for="deskripsi">Deskripsi</label>
        <textarea id="deskripsi" name="deskripsi" rows="4"></textarea>
    </div>

    <div class="form-group">
        <label for="mata_kuliah">Mata Kuliah *</label>
        <select id="mata_kuliah" name="matkul_id" required>
            <option value="">-- Pilih Mata Kuliah --</option>
            {% for m in matkul_list %}
            <option value="{{ m.id }}">{{ m.nama_matkul }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="deadline">Deadline (tanggal)</label>
        <input type="date" id="deadline" name="deadline">
    </div>

    <div class="form-group">
        <label for="status">Status *</label>
        <select id="status" name="status" required>
            <option value="belum">Belum</option>
            <option value="proses">Proses</option>
            <option value="selesai">Selesai</option>
        </select>
    </div>

    <button type="submit" class="btn btn-primary">Simpan Tugas</button>
</form>
{% endblock %}
